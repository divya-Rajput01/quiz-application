<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
   <div>

    <div class="loginContainer">
        <p id="error" style="color:red;"></p>
        <h3 style="color: black;">Welcome Back</h3>
           <h5>Please enter your details to Continue</h5>
        <form action="/quizcategory" method="post">
            <input id="name" type="text" placeholder="Enter Name" name="name" />
            <br><br>
            <input id="email" type="text" placeholder="Enter Email" name="email" />
            <br><br>
        <select name="role" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="faculty">Faculty</option>
        </select>
        <br><br>
            <button type="button" onclick="validate()">Continue</button>
        </form>
       
    </div>
    </div>
    <!-- <script src="/javascript/timer.js"></script> -->
      <script src="/javascript/login.js"></script>
     
</body>

</html>
